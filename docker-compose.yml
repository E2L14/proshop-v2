services:
  mongo:
    image: mongo:6
    container_name: proshop-mongo
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - proshop-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: proshop-backend
    restart: always
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/proshop
      JWT_SECRET: abc123
      PAYPAL_CLIENT_ID: sb
    depends_on:
      - mongo
    networks:
      - proshop-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proshop-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - proshop-network

proxy:
    build:
      context: ./nginx
    container_name: proshop-proxy
    restart: always
    ports:
      - '80:80'
    depends_on:
      - frontend
      - backend
    networks:
      - proshop-network

volumes:
  mongo-data:

networks:
  proshop-network:
    driver: bridge